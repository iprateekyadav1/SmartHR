services:
  - type: web
    name: smarthr
    env: python
    buildCommand: |
      pip install -r requirements.txt &&
      python -m spacy download en_core_web_sm &&
      python -m nltk.downloader vader_lexicon &&
      python seed.py
    startCommand: gunicorn "app:create_app()"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
